services:
  # Single web service running Apache (PHP) — RAG chatbot runs on Google Cloud Run
  - type: web
    name: notun-alo
    runtime: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    region: oregon
    envVars:
      # ── Database Connection (Set these in Render Dashboard for security) ──
      - key: DB_HOST
        value: "your-aiven-db-host.a.aivencloud.com"
      - key: DB_PORT
        value: "20764"
      - key: DB_USER
        value: "avnadmin"
      - key: DB_PASS
        value: "your-secure-password"
      - key: DB_NAME
        value: "defaultdb"
      # ── Cloud Run RAG service URL (set after deploying to Cloud Run) ──
      - key: RAG_API_URL
        value: https://notun-alo-rag-xxx-uc.a.run.app
      - key: RAG_ENABLED
        value: "true"
      # ── Public site URL (for correct redirects) ──
      - key: BASE_URL
        value: https://notun-alo.onrender.com
