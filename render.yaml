services:
  # Single web service running Apache (PHP) + Flask (RAG) together
  - type: web
    name: notun-alo
    runtime: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    region: oregon
    envVars:
      # ── Database (set these from your Aiven MySQL dashboard) ──
      - key: DB_HOST
        value: ""
      - key: DB_PORT
        value: ""
      - key: DB_USER
        value: ""
      - key: DB_PASS
        value: ""
      - key: DB_NAME
        value: ""
      # ── Get from https://aistudio.google.com ──
      - key: GEMINI_API_KEY
        sync: false
      # ── Public site URL (for correct redirects) ──
      - key: BASE_URL
        value: https://notun-alo.onrender.com
