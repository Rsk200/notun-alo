services:
  # 1. PHP Frontend
  - type: web
    name: notun-alo-php
    runtime: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    region: oregon
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: notun-alo-db
          property: host
      - key: DB_USER
        fromDatabase:
          name: notun-alo-db
          property: user
      - key: DB_PASS
        fromDatabase:
          name: notun-alo-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: notun-alo-db
          property: database

  # 2. Flask AI Background Worker
  - type: worker
    name: notun-alo-flask
    runtime: docker
    dockerContext: .
    dockerfilePath: Dockerfile.flask
    plan: free
    region: oregon
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: notun-alo-db
          property: host
      - key: DB_USER
        fromDatabase:
          name: notun-alo-db
          property: user
      - key: DB_PASS
        fromDatabase:
          name: notun-alo-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: notun-alo-db
          property: database

databases:
  # 3. Managed PostgreSQL (Compatible with your logic)
  - name: notun-alo-db
    plan: free
    region: oregon
