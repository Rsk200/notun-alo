services:
  # Single web service running Apache (PHP) — RAG chatbot runs on Google Cloud Run
  - type: web
    name: notun-alo
    runtime: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    region: oregon
    envVars:
      # ── Database (set these from your Aiven MySQL dashboard) ──
      - key: DB_HOST
        value: ""
      - key: DB_PORT
        value: ""
      - key: DB_USER
        value: ""
      - key: DB_PASS
        value: ""
      - key: DB_NAME
        value: ""
      # ── Cloud Run RAG service URL (set after deploying to Cloud Run) ──
      - key: RAG_API_URL
        value: https://notun-alo-rag-xxx-uc.a.run.app
      - key: RAG_ENABLED
        value: "true"
      # ── Public site URL (for correct redirects) ──
      - key: BASE_URL
        value: https://notun-alo.onrender.com
